<section class="section section--deep" id="atuacao">
  <div class="container">
    <div class="services__head" appReveal>
      <span class="eyebrow">Áreas de Atuação</span>
      <h2>Como posso ajudar você</h2>
    </div>

    <div class="services__grid">
      @for (servico of content.servicos; track servico.titulo; let i = $index) {
        <article class="service-card" appReveal [style.transition-delay.ms]="i * 60">
          <h3>{{ servico.titulo }}</h3>
          <p>{{ servico.descricao }}</p>
        </article>
      }
    </div>
  </div>
</section>
