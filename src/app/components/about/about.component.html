<section class="section about" id="sobre" appReveal>
  <div class="container about__grid">
    <div class="about__stat">
      <span class="about__stat-number">{{ content.sobre.anosExperiencia }}+</span>
      <span class="about__stat-label">anos de experiência jurídica</span>
    </div>

    <div class="about__body">
      <span class="eyebrow">Sobre mim</span>
      <h2>Um acompanhamento próximo, do primeiro contato à solução.</h2>
      <p>{{ content.sobre.texto }}</p>

      <div class="about__quando">
        <h3>{{ content.quandoContratar.titulo }}</h3>
        <p>{{ content.quandoContratar.texto }}</p>
      </div>
    </div>
  </div>
</section>
